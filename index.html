<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注音拼音 雙課大禮包 - 解方篇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: transparent;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .text-brand-purple { color: #5b4a9a; }
        .bg-brand-purple { background-color: #5b4a9a; }
        .border-brand-purple { border-color: #5b4a9a; }

        .mega-course-card {
            background: #ffffff; 
            border: 3px solid #7c3aed; 
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.25); 
        }

        .mega-course-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.4) 30%,
                rgba(255, 255, 255, 0.8) 50%,
                rgba(255, 255, 255, 0.4) 70%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            pointer-events: none;
            z-index: 5;
            animation: sweep-glare 6s ease-in-out infinite;
        }

        @keyframes sweep-glare {
            0% { left: -150%; }
            25% { left: 150%; }
            100% { left: 150%; }
        }

        .btn-action {
            background: linear-gradient(to bottom, #7c3aed, #4f46e5);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px -3px rgba(124, 58, 237, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            background: linear-gradient(to bottom, #8b5cf6, #6366f1);
            transform: scale(1.02);
            box-shadow: 0 10px 25px -3px rgba(124, 58, 237, 0.7);
        }
    </style>
</head>
<body class="bg-transparent pt-1 sm:pt-4 pb-12 px-4 md:px-0">

    <div id="iframe-wrapper-part2" class="max-w-md lg:max-w-4xl mx-auto">

        <div class="w-full text-center max-w-2xl mx-auto px-4 mt-0 mb-4 sm:mb-10">
            <h4 class="text-xl sm:text-2xl font-black text-[#5b4a9a] tracking-wide leading-tight">
                讓這兩堂課來解決你的所有煩惱！
            </h4>
        </div>

        <section class="max-w-5xl mx-auto relative px-1 sm:px-4">

            <div class="mega-course-card z-10">
                <div class="pt-7 pb-3.5 px-4 sm:p-8 space-y-4">
                    
                    <div class="space-y-1 text-center mb-4 sm:mb-8">
                        <h3 class="text-2xl sm:text-3xl md:text-4xl font-black text-slate-900 tracking-wide leading-tight break-words">
                            <span>注音趴＋拼音趴</span><span class="bg-gradient-to-r from-violet-600 to-indigo-600 bg-clip-text text-transparent ml-1 sm:ml-2">雙課大禮包</span>
                        </h3>
                    </div>

                    <!-- 手機專屬頁籤：僅在手機版呈現 (lg:hidden)，電腦版自動隱藏 -->
                    <div class="flex bg-slate-100/80 p-1 rounded-xl lg:hidden mb-3 max-w-[260px] mx-auto border border-slate-200/40">
                        <button onclick="switchTab('zhuyin')" id="tab-tab-zhuyin" class="flex-1 py-2 text-xs font-black rounded-lg transition-all bg-white text-violet-700 shadow-sm">
                            注音趴介紹
                        </button>
                        <button onclick="switchTab('pinyin')" id="tab-tab-pinyin" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800">
                            拼音趴介紹
                        </button>
                    </div>

                    <div class="pb-1 mb-6">
                        <!-- 電腦版自動並排 (lg:grid-cols-2)，手機版維持單欄 (grid-cols-1) -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 lg:gap-6">
                            
                            <!-- 課程 1：兒童注音趴 -->
                            <div id="course-zhuyin" class="bg-amber-50/20 rounded-2xl p-4 sm:p-5 border border-amber-100 flex flex-col justify-between h-full space-y-4 transition-all duration-300">
                                <div class="w-full">
                                    <div class="relative rounded-xl overflow-hidden aspect-[16/9] bg-slate-100 border border-slate-100 shadow-sm">
                                        <img src="https://image.fevercdn.com?bucket=picture-original.fevercdn.com&filepath=parenting%2F5%2F2103%2Ffbb7121133203da17d96ec12.png" alt="注音趴課程" class="w-full h-full object-cover">
                                    </div>
                                </div>
                                <div class="space-y-2.5 flex-grow">
                                    <h5 class="text-base sm:text-lg font-black text-slate-900 flex items-center gap-2">
                                        注音趴：奠定注音基礎
                                    </h5>
                                    <ul class="space-y-2 text-slate-700 text-xs sm:text-sm">
                                        <li class="flex items-start">
                                            <span class="text-amber-500 mr-2 font-bold">•</span>
                                            <span><strong>獨家圖像聯想記 37 符號</strong></span>
                                        </li>
                                        <li class="flex items-start">
                                            <span class="text-amber-500 mr-2 font-bold">•</span>
                                            <span><strong>有節奏感的注音唸謠</strong></span>
                                        </li>
                                        <li class="flex items-start">
                                            <span class="text-amber-500 mr-2 font-bold">•</span>
                                            <span><strong>故事姐姐親示發音難關</strong></span>
                                        </li>
                                    </ul>
                                </div>
                            </div>

                            <!-- 課程 2：兒童拼音趴 (手機預設隱藏 hidden，電腦版強制顯示 lg:flex 保持並排) -->
                            <div id="course-pinyin" class="bg-violet-50/20 rounded-2xl p-4 sm:p-5 border border-rose-100 flex-col lg:flex justify-between h-full space-y-4 transition-all duration-300 hidden">
                                <div class="w-full">
                                    <div class="relative rounded-xl overflow-hidden aspect-[16/9] bg-slate-100 border border-slate-100 shadow-sm">
                                        <img src="https://image.fevercdn.com?bucket=picture-original.fevercdn.com&filepath=parenting%2F5%2F2103%2F8a83beff83b6bf77df8bbe1f.png" alt="拼音趴課程" class="w-full h-full object-cover">
                                    </div>
                                </div>
                                <div class="space-y-2.5 flex-grow">
                                    <h5 class="text-base sm:text-lg font-black text-slate-900 flex items-center gap-2">
                                        拼音趴：突破聲調與拼音難關
                                    </h5>
                                    <ul class="space-y-2 text-slate-700 text-xs sm:text-sm">
                                        <li class="flex items-start">
                                            <span class="text-violet-500 mr-2 font-bold">•</span>
                                            <span><strong>拼音規則化為動畫劇情</strong></span>
                                        </li>
                                        <li class="flex items-start">
                                            <span class="text-violet-500 mr-2 font-bold">•</span>
                                            <span><strong>進階拼音唸謠幫助記憶</strong></span>
                                        </li>
                                        <li class="flex items-start">
                                            <span class="text-violet-500 mr-2 font-bold">•</span>
                                            <span><strong>告別常見易混淆發音</strong></span>
                                        </li>
                                    </ul>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 結帳促銷區 (全新重構版：手機版版面更舒適且高質感) -->
                    <div class="bg-slate-50/80 rounded-2xl p-4 sm:p-5 border border-slate-100 shadow-sm">
                        <div class="space-y-4">
                            
                            <!-- 價格與折價券 (在手機版流暢垂直堆疊，電腦版水平橫排) -->
                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-slate-200/60 pb-4">
                                <!-- 左側：大字特惠價 -->
                                <div class="text-center sm:text-left flex flex-col justify-center">
                                    <span class="text-slate-400 line-through text-xs block">原價 $7,600</span>
                                    <div class="text-orange-600 font-black text-2xl sm:text-3xl tracking-tight mt-0.5 whitespace-nowrap">
                                        NT$ <span class="text-3xl sm:text-4xl">5,490</span>
                                    </div>
                                </div>
                                
                                <!-- 右側：高質感虛線折扣票卡區，保證小螢幕絕對不爆字跑版 -->
                                <div class="flex-1 w-full max-w-md mx-auto sm:mx-0">
                                    <div class="flex items-center justify-between bg-rose-50/70 border border-dashed border-rose-300 rounded-xl p-3">
                                        <div class="flex items-center gap-2 pr-2">
                                            <span class="bg-rose-600 text-white text-[11px] sm:text-xs font-mono font-black px-2 py-0.5 rounded shadow-sm shrink-0">GPM300</span>
                                            <span class="text-xs sm:text-sm text-rose-700 font-bold leading-tight">輸入代碼再折 300 元</span>
                                        </div>
                                        <button id="coupon-btn" onclick="copyCouponCode('GPM300')" class="bg-white hover:bg-rose-100/50 border border-rose-200 text-rose-600 text-xs sm:text-sm font-black px-3 py-1.5 rounded-lg flex items-center gap-1 active:scale-95 transition-all shrink-0">
                                            <i class="fa-regular fa-copy"></i>
                                            <span>複製</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 搶先優惠按鈕 -->
                            <a href="https://learning.parenting.com.tw/plans/467de1dc-cefd-4a7c-a852-ee32c81e91a2?utm_source=SiteTopic.website&utm_medium=referral&utm_campaign=cp_r_2606bopomofo_course_bundle_lp_20260528" target="_blank" rel="noopener noreferrer" class="btn-action w-full py-3.5 px-5 rounded-2xl font-black text-base sm:text-lg transition-all duration-300 text-center block">
                                <span class="whitespace-nowrap">搶先領取限時優惠 ➔</span>
                            </a>

                        </div>
                    </div>

                </div>
            </div>

        </section>

    </div>

    <!-- 腳本邏輯 -->
    <script>
        function switchTab(tab) {
            const zhuyinCard = document.getElementById('course-zhuyin');
            const pinyinCard = document.getElementById('course-pinyin');
            const tabZhuyin = document.getElementById('tab-tab-zhuyin');
            const tabPinyin = document.getElementById('tab-tab-pinyin');

            if (window.innerWidth < 1024) {
                if (tab === 'zhuyin') {
                    zhuyinCard.classList.remove('hidden');
                    pinyinCard.classList.add('hidden');
                    pinyinCard.classList.remove('flex');
                    tabZhuyin.className = "flex-1 py-2 text-xs font-black rounded-lg transition-all bg-white text-violet-700 shadow-sm";
                    tabPinyin.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800";
                } else {
                    zhuyinCard.classList.add('hidden');
                    pinyinCard.classList.remove('hidden');
                    pinyinCard.classList.add('flex');
                    tabZhuyin.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800";
                    tabPinyin.className = "flex-1 py-2 text-xs font-black rounded-lg transition-all bg-white text-violet-700 shadow-sm";
                }
            }
            sendHeightToParent();
        }

        window.addEventListener('resize', () => {
            const zhuyinCard = document.getElementById('course-zhuyin');
            const pinyinCard = document.getElementById('course-pinyin');
            if (window.innerWidth >= 1024) {
                zhuyinCard.classList.remove('hidden');
                pinyinCard.classList.remove('hidden');
                pinyinCard.classList.add('flex');
            } else {
                switchTab('zhuyin');
            }
            sendHeightToParent();
        });

        function sendHeightToParent() {
            setTimeout(() => {
                const wrapper = document.getElementById('iframe-wrapper-part2');
                if (wrapper) {
                    const height = wrapper.scrollHeight + 40;
                    window.parent.postMessage({
                        type: 'resize-iframe-part2',
                        height: height
                    }, '*');
                }
            }, 50);
        }

        window.addEventListener('load', () => {
            if (window.innerWidth < 1024) {
                switchTab('zhuyin');
            }
            sendHeightToParent();
        });

        // 複製邏輯：適配新的按鈕與樣式
        function copyCouponCode(code) {
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = code;
            tempTextArea.style.position = 'fixed'; 
            tempTextArea.style.opacity = '0';
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    const couponBtn = document.getElementById('coupon-btn');
                    const originalHTML = couponBtn.innerHTML;
                    
                    couponBtn.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-500"></i><span>已複製</span>`;
                    couponBtn.className = "bg-emerald-50 border border-emerald-200 text-emerald-600 text-xs sm:text-sm font-black px-3 py-1.5 rounded-lg flex items-center gap-1 transition-all shrink-0";
                    
                    setTimeout(() => {
                        couponBtn.innerHTML = originalHTML;
                        couponBtn.className = "bg-white hover:bg-rose-100/50 border border-rose-200 text-rose-600 text-xs sm:text-sm font-black px-3 py-1.5 rounded-lg flex items-center gap-1 active:scale-95 transition-all shrink-0";
                    }, 2000);
                }
            } catch (err) {
                console.error('複製失敗: ', err);
            } finally {
                document.body.removeChild(tempTextArea);
            }
        }
    </script>

</body>
</html>
